            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "version=${latest_version}" >> "$GITHUB_OUTPUT"

      - name: Update llama.cpp overlay 📝
        if: steps.check.outputs.updated == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail

          OVERLAYS_NIX="overlays/default.nix"
          FAKE_HASH="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          HASH_LOG="/tmp/llama-cpp-hash.log"
          SRC_EXPR='let flake = builtins.getFlake (toString ./.); pkgs = import flake.inputs.nixpkgs { system = builtins.currentSystem; overlays = builtins.attrValues flake.outputs.overlays; config.allowUnfree = true; }; in pkgs.llama-cpp.src'
          NPM_EXPR='let flake = builtins.getFlake (toString ./.); pkgs = import flake.inputs.nixpkgs { system = builtins.currentSystem; overlays = builtins.attrValues flake.outputs.overlays; config.allowUnfree = true; }; in pkgs.llama-cpp.npmDeps'

          extract_hash() {
            local hash
            hash=$(awk '
              /got:/ {
                match($0, /sha256-[A-Za-z0-9+\/=]+/)
                print substr($0, RSTART, RLENGTH)
                exit
              }
            ' "$HASH_LOG")

            if [[ -z "$hash" ]]; then
              echo "❌ Failed to extract hash" >&2
              cat "$HASH_LOG" >&2
              exit 1
            fi

            echo "$hash"
          }

          echo "📝 Updating llama.cpp version to ${VERSION}"
          sed -i "s/^  llamaCppVersion = \".*\";/  llamaCppVersion = \"${VERSION}\";/" "$OVERLAYS_NIX"

          echo "🧮 Prefetching source hash"
          sed -i "s|^  llamaCppHash = \"sha256-[^\"]*\";|  llamaCppHash = \"${FAKE_HASH}\";|" "$OVERLAYS_NIX"
          nix build --impure --expr "$SRC_EXPR" --no-link >"$HASH_LOG" 2>&1 || true
          src_hash=$(extract_hash)
          sed -i "s|^  llamaCppHash = \"sha256-[^\"]*\";|  llamaCppHash = \"${src_hash}\";|" "$OVERLAYS_NIX"
          echo "🔑 Source hash: ${src_hash}"

          echo "🧮 Prefetching npm deps hash"
          sed -i "s|^  llamaCppNpmDepsHash = \"sha256-[^\"]*\";|  llamaCppNpmDepsHash = \"${FAKE_HASH}\";|" "$OVERLAYS_NIX"
          nix build --impure --expr "$NPM_EXPR" --no-link >"$HASH_LOG" 2>&1 || true
          npm_hash=$(extract_hash)
          sed -i "s|^  llamaCppNpmDepsHash = \"sha256-[^\"]*\";|  llamaCppNpmDepsHash = \"${npm_hash}\";|" "$OVERLAYS_NIX"
          echo "🔑 npm deps hash: ${npm_hash}"

          rm -f "$HASH_LOG"
          echo "✅ Updated ${OVERLAYS_NIX}"
          git diff "$OVERLAYS_NIX"

      - name: Create pull request 🚀
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          BRANCH="llama-cpp-${VERSION}"

          if gh pr list --search "head:${BRANCH}" --json number --jq '.[0].number' | grep -q .; then
            echo "⏭️  PR already exists for ${BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add overlays/default.nix
          git commit -m "chore(llama-cpp): update to ${VERSION}"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore(llama-cpp): update to ${VERSION}" \
            --body "$(cat <<EOF
          Automated llama.cpp update to build ${VERSION}.

          Tags: https://github.com/ggml-org/llama.cpp/tags
          EOF
          )" \
            --label "dependencies,automated")

          echo "📋 Created PR: ${PR_URL}"

          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh pr merge --auto --squash "$PR_NUMBER"

