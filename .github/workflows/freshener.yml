# Proposed refactor of freshener.yml (move 1 of 2: deduplicate into a matrix).
#
# This preserves the current behaviour of every job while removing the
# copy-pasted checkout, Nix setup, cache, and pull request scaffolding. Each
# package now contributes one matrix entry plus a short "update" script, and
# the shared steps run once.
#
# Move 2 (a separate change) migrates the "package" entries from hand-rolled
# prefetch and sed to nix-update where the derivation shape allows it. Wavebox
# (two platforms in one file) and Defold (artefacts re-pushed under one tag)
# keep bespoke update logic until their derivations are reshaped.
name: Package Freshener 🍋
on:
  schedule:
    - cron: "20 4 * * 2,4"
  workflow_dispatch:

jobs:
  freshen:
    name: ${{ matrix.name }} 📦
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    strategy:
      # Keep going when one package fails so an upstream outage does not block
      # the others.
      fail-fast: false
      matrix:
        include:
          - id: wavebox
            name: Wavebox
            changelog: https://wavebox.io/blog/releases/
          - id: defold
            name: Defold
            changelog: https://github.com/defold/defold/releases
          - id: concord
            name: Concord
            changelog: https://github.com/chojs23/concord/releases
          - id: voxtype
            name: Voxtype
            changelog: https://github.com/peteonrails/voxtype/releases
          - id: paseo
            name: Paseo
            changelog: https://github.com/getpaseo/paseo/commits
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            eval-cores = 0
      - uses: DeterminateSystems/flakehub-cache-action@v3

      # Each package's update logic lives in its own script under
      # .github/freshener/. The script decides whether an update is needed,
      # applies it, and prints the following to $GITHUB_OUTPUT:
      #   updated=true|false
      #   version=<version or short revision>   (only when updated=true)
      #   files=<space-separated paths to stage> (only when updated=true)
      - name: Check and update ${{ matrix.name }} 🔍
        id: update
        run: .github/freshener/${{ matrix.id }}.sh
        # The scripts read no secrets; they only fetch public release metadata.

      - name: Create pull request 🚀
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          PKG_ID: ${{ matrix.id }}
          PKG_NAME: ${{ matrix.name }}
          CHANGELOG: ${{ matrix.changelog }}
          VERSION: ${{ steps.update.outputs.version }}
          FILES: ${{ steps.update.outputs.files }}
        run: .github/freshener/open-pr.sh
