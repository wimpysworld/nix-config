name: Package Freshener 🍋
on:
  schedule:
    - cron: "20 4 * * 2,4"
  workflow_dispatch:

jobs:
  wavebox:
    name: Wavebox 📦
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            eval-cores = 0
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - name: Check for Wavebox update 🔍
        id: check
        run: |
          set -euo pipefail

          PKG_NIX="pkgs/wavebox/default.nix"

          LINUX_JSON="https://download.wavebox.app/stable/linux/latest.json"
          DARWIN_JSON="https://download.wavebox.app/stable/macuniversal/latest.json"

          # Extract current versions from the Nix file
          current_linux=$(awk '/^  linux = stdenvNoCC.mkDerivation/,/^  \}\);/ { if ($0 ~ /version = "/) { match($0, /version = "([^"]+)"/, arr); print arr[1]; exit } }' "$PKG_NIX")
          current_darwin=$(awk '/^  darwin = stdenvNoCC.mkDerivation/,/^  \}\);/ { if ($0 ~ /version = "/) { match($0, /version = "([^"]+)"/, arr); print arr[1]; exit } }' "$PKG_NIX")

          echo "Current Linux:  ${current_linux}"
          echo "Current Darwin: ${current_darwin}"

          # Fetch latest versions from Wavebox API
          latest_linux=$(curl -fsSL "$LINUX_JSON" | jq -r '.urls.deb | match("wavebox_(.+)_amd64\\.deb").captures[0].string')
          latest_darwin=$(curl -fsSL "$DARWIN_JSON" | jq -r '.url | match("Install%20Wavebox%20(.+)\\.dmg").captures[0].string')

          if [[ -z "$latest_linux" || "$latest_linux" == "null" || -z "$latest_darwin" || "$latest_darwin" == "null" ]]; then
            echo "❌ Could not determine latest Wavebox version"
            exit 1
          fi

          echo "Latest Linux:   ${latest_linux}"
          echo "Latest Darwin:  ${latest_darwin}"

          if [[ "$current_linux" == "$latest_linux" && "$current_darwin" == "$latest_darwin" ]]; then
            echo "✅ Wavebox is up to date"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "linux_version=${latest_linux}" >> "$GITHUB_OUTPUT"
          echo "darwin_version=${latest_darwin}" >> "$GITHUB_OUTPUT"

      - name: Update Wavebox package 📝
        if: steps.check.outputs.updated == 'true'
        env:
          LINUX_VERSION: ${{ steps.check.outputs.linux_version }}
          DARWIN_VERSION: ${{ steps.check.outputs.darwin_version }}
        run: |
          set -euo pipefail

          PKG_NIX="pkgs/wavebox/default.nix"

          # Fetch and hash the Linux deb
          linux_url="https://download.wavebox.app/stable/linux/deb/amd64/wavebox_${LINUX_VERSION}_amd64.deb"
          echo "⬇️  Fetching Linux deb: ${linux_url}"
          linux_store=$(nix store prefetch-file --json --hash-type sha256 "$linux_url" | jq -r '.hash')
          echo "🔑 Linux hash: ${linux_store}"

          # Fetch and hash the Darwin dmg
          darwin_url="https://download.wavebox.app/stable/macuniversal/Install%20Wavebox%20${DARWIN_VERSION}.dmg"
          echo "⬇️  Fetching Darwin dmg: ${darwin_url}"
          darwin_store=$(nix store prefetch-file --json --hash-type sha256 --name wavebox.dmg "$darwin_url" | jq -r '.hash')
          echo "🔑 Darwin hash: ${darwin_store}"

          # Update Linux version and hash
          sed -i "/^  linux = stdenvNoCC.mkDerivation/,/^  });/s/version = \".*\"/version = \"${LINUX_VERSION}\"/" "$PKG_NIX"
          sed -i "/^  linux = stdenvNoCC.mkDerivation/,/^  });/s|hash = \".*\"|hash = \"${linux_store}\"|" "$PKG_NIX"

          # Update Darwin version and hash
          sed -i "/^  darwin = stdenvNoCC.mkDerivation/,/^  });/s/version = \".*\"/version = \"${DARWIN_VERSION}\"/" "$PKG_NIX"
          sed -i "/^  darwin = stdenvNoCC.mkDerivation/,/^  });/s|hash = \".*\"|hash = \"${darwin_store}\"|" "$PKG_NIX"

          echo "✅ Updated pkgs/wavebox/default.nix"
          git diff "$PKG_NIX"

      - name: Create pull request 🚀
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          LINUX_VERSION: ${{ steps.check.outputs.linux_version }}
        run: |
          BRANCH="wavebox-${LINUX_VERSION}"

          # Check if a PR already exists for this version
          if gh pr list --search "head:${BRANCH}" --json number --jq '.[0].number' | grep -q .; then
            echo "⏭️  PR already exists for ${BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pkgs/wavebox/default.nix
          git commit -m "chore(wavebox): update to ${LINUX_VERSION}"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore(wavebox): update to ${LINUX_VERSION}" \
            --body "$(cat <<EOF
          Automated Wavebox update to version ${LINUX_VERSION}.

          Changelog: https://wavebox.io/blog/releases/
          EOF
          )" \
            --label "dependencies,automated")

          echo "📋 Created PR: ${PR_URL}"

          # Extract PR number and enable auto-merge
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh pr merge --auto --squash "$PR_NUMBER"

  ollama:
    name: Ollama 📦
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            eval-cores = 0
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - name: Check for Ollama update 🔍
        id: check
        run: |
          set -euo pipefail

          OVERLAYS_NIX="overlays/default.nix"
          current_version=$(sed -n 's/^  ollamaVersion = "\(.*\)";/\1/p' "$OVERLAYS_NIX")
          echo "Current version: ${current_version}"

          latest_tag=$(curl -fsSL "https://api.github.com/repos/ollama/ollama/releases/latest" | jq -r '.tag_name')
          latest_version="${latest_tag#v}"

          if [[ -z "$latest_version" || "$latest_version" == "null" || "$latest_tag" != v* ]]; then
            echo "❌ Could not determine latest Ollama version"
            exit 1
          fi

          echo "Latest version: ${latest_version}"

          if [[ "$current_version" == "$latest_version" ]]; then
            echo "✅ Ollama is up to date"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "version=${latest_version}" >> "$GITHUB_OUTPUT"

      - name: Update Ollama overlay 📝
        if: steps.check.outputs.updated == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail

          OVERLAYS_NIX="overlays/default.nix"
          FAKE_HASH="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          HASH_LOG="/tmp/ollama-hash.log"
          SRC_EXPR='let flake = builtins.getFlake (toString ./.); pkgs = import flake.inputs.nixpkgs { system = builtins.currentSystem; overlays = builtins.attrValues flake.outputs.overlays; config.allowUnfree = true; }; in pkgs.ollama.src'
          VENDOR_EXPR='let flake = builtins.getFlake (toString ./.); pkgs = import flake.inputs.nixpkgs { system = builtins.currentSystem; overlays = builtins.attrValues flake.outputs.overlays; config.allowUnfree = true; }; in pkgs.ollama.goModules'

          extract_hash() {
            local hash
            hash=$(awk '
              /got:/ {
                match($0, /sha256-[A-Za-z0-9+\/=]+/)
                print substr($0, RSTART, RLENGTH)
                exit
              }
            ' "$HASH_LOG")

            if [[ -z "$hash" ]]; then
              echo "❌ Failed to extract hash" >&2
              cat "$HASH_LOG" >&2
              exit 1
            fi

            echo "$hash"
          }

          echo "📝 Updating Ollama version to ${VERSION}"
          sed -i "s/^  ollamaVersion = \".*\";/  ollamaVersion = \"${VERSION}\";/" "$OVERLAYS_NIX"

          echo "🧮 Prefetching source hash"
          sed -i "s|^  ollamaHash = \"sha256-[^\"]*\";|  ollamaHash = \"${FAKE_HASH}\";|" "$OVERLAYS_NIX"
          nix build --impure --expr "$SRC_EXPR" --no-link >"$HASH_LOG" 2>&1 || true
          src_hash=$(extract_hash)
          sed -i "s|^  ollamaHash = \"sha256-[^\"]*\";|  ollamaHash = \"${src_hash}\";|" "$OVERLAYS_NIX"
          echo "🔑 Source hash: ${src_hash}"

          echo "🧮 Prefetching vendor hash"
          sed -i "s|^  ollamaVendorHash = \"sha256-[^\"]*\";|  ollamaVendorHash = \"${FAKE_HASH}\";|" "$OVERLAYS_NIX"
          nix build --impure --expr "$VENDOR_EXPR" --no-link >"$HASH_LOG" 2>&1 || true
          vendor_hash=$(extract_hash)
          sed -i "s|^  ollamaVendorHash = \"sha256-[^\"]*\";|  ollamaVendorHash = \"${vendor_hash}\";|" "$OVERLAYS_NIX"
          echo "🔑 Vendor hash: ${vendor_hash}"

          rm -f "$HASH_LOG"
          echo "✅ Updated ${OVERLAYS_NIX}"
          git diff "$OVERLAYS_NIX"

      - name: Create pull request 🚀
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          BRANCH="ollama-${VERSION}"

          if gh pr list --search "head:${BRANCH}" --json number --jq '.[0].number' | grep -q .; then
            echo "⏭️  PR already exists for ${BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add overlays/default.nix
          git commit -m "chore(ollama): update to ${VERSION}"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore(ollama): update to ${VERSION}" \
            --body "$(cat <<EOF
          Automated Ollama update to version ${VERSION}.

          Release: https://github.com/ollama/ollama/releases/tag/v${VERSION}
          EOF
          )" \
            --label "dependencies,automated")

          echo "📋 Created PR: ${PR_URL}"

          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          gh pr merge --auto --squash "$PR_NUMBER"

  llama-cpp:
