            git ls-remote --tags --refs https://github.com/ggml-org/llama.cpp.git 'b*' \
              | awk -F/ '{ print $3 }' \
              | sed 's/^b//' \
              | sort -V \
              | tail -n 1
          )

          if [[ -z "$latest_version" ]]; then
            echo "❌ Could not determine latest llama.cpp version"
            exit 1
          fi

          echo "Latest version: ${latest_version}"

          if [[ "$current_version" == "$latest_version" ]]; then
