name: Tailor 🪡
on:
  schedule:
    - cron: "0 9 * * 1" # Weekly
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  alter:
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ secrets.TAILOR_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Tailor
        uses: wimpysworld/tailor@v0
        with:
          alter: true

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: tailor-alter
          title: "chore: alter tailor swatches"
